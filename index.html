<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vero Beach Date Night Guide (John's Island Area)</title>
  <style>
    body{font-family:Inter,system-ui,Arial,sans-serif;background:#0b1020;color:#eef2ff;margin:0}
    .wrap{max-width:1100px;margin:0 auto;padding:24px}
    h1{margin:0 0 8px;font-size:30px}
    .sub{color:#a5b4fc;margin-bottom:18px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
    .card{background:#111833;border:1px solid #24305f;border-radius:14px;padding:14px}
    .name{font-size:19px;font-weight:700;margin-bottom:4px}
    .meta{font-size:14px;color:#c7d2fe;margin-bottom:8px}
    .why{font-size:14px;line-height:1.4;color:#e2e8f0;margin-bottom:10px}
    .links a{display:inline-block;margin:4px 8px 0 0;padding:7px 10px;border-radius:8px;text-decoration:none;font-size:13px}
    .review{background:#1f2a52;color:#bfdbfe}
    .reserve{background:#14532d;color:#bbf7d0}
    .site{background:#3f3f46;color:#e4e4e7}
    .uber{background:#3b0764;color:#e9d5ff}
    .foot{margin-top:16px;font-size:12px;color:#93a3d9}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>💙 Date Night in Vero Beach (John's Island Area)</h1>
    <div class="sub">Filtered list: only restaurants with direct OpenTable reservation links from the restaurant website flow.</div>
    <div class="grid" id="cards"></div>
    <div class="foot">Built for Jeff • Review snapshots are based on recent public listings and linked sources.</div>
  </div>

  <script>
    const places = [
      {name:"Cobalt (Vero Beach Hotel & Spa)",area:"Kimpton Vero Beach",review:"Upscale oceanfront dining with polished service and date-night energy.",reviewLink:"https://www.yelp.com/biz/cobalt-vero-beach",reserveLink:"https://www.opentable.com/r/cobalt-vero-beach",websiteLink:"https://www.cobaltrestaurant.com/", address:"3500 Ocean Dr, Vero Beach, FL 32963"},
      {name:"Heaton's Vero Beach",area:"Kimpton Vero Beach",review:"Great cocktails + beachfront ambience for a relaxed date night.",reviewLink:"https://www.yelp.com/biz/heatons-vero-beach",reserveLink:"https://www.opentable.com/r/heatons-vero-beach",websiteLink:"https://www.heatonsverobeach.com/",address:"3500 Ocean Dr, Vero Beach, FL 32963"}
    ];

    const uber = (address) => `https://m.uber.com/ul/?action=setPickup&pickup=my_location&dropoff[formatted_address]=${encodeURIComponent(address)}`;
    const cards = document.getElementById('cards');
    cards.innerHTML = places.map((p,i)=>`
      <article class="card">
        <div class="name">${i+1}. ${p.name}</div>
        <div class="meta">📍 ${p.area}</div>
        <div class="why">${p.review}</div>
        <div class="links">
          <a class="review" href="${p.reviewLink}" target="_blank" rel="noopener">Reviews</a>
          <a class="reserve" href="${p.reserveLink}" target="_blank" rel="noopener">Reservations</a>
          <a class="site" href="${p.websiteLink}" target="_blank" rel="noopener">Restaurant Website</a>
          <a class="uber" href="${uber(p.address)}" target="_blank" rel="noopener">Uber to here</a>
        </div>
      </article>
    `).join('');
  </script>
</body>
</html>
